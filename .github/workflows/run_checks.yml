name: run-checks
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: stable
      - name: setup deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpam0g-dev \
            curl \
            tar
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.4
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: stable
      - name: setup deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpam0g-dev \
            curl \
            tar
      - name: test module
        run: |
          go test -test.v
      - name: build module
        env:
          CGO_ENABLED: 1
          GOOS: linux
          # just build x86_64 for now, will do arm for the release action
        run: |
          go mod tidy
          go build -buildmode=c-shared -o supa_jitdb_pam.so
