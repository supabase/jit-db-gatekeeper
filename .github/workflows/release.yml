name: Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  id-token: write # This is required for requesting the JWT from AWS
  contents: read

jobs:
  build:
    name: build release artifacts
    runs-on: ubuntu-24.04-arm
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: build artifacts
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31.9.0
      - run: nix flake check
      - run: nix build

      - name: Get asset name
        run: |
          ASSET_NAME=pam_jit_pg-${{ steps.version.outputs.tag }}-arm64-linux-gnu.so
          cp result/lib/security/pam_jit_pg.so ./$ASSET_NAME
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

      - name: Upload build artifacts for bundling
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ASSET_NAME }}
          path: ./${{ env.ASSET_NAME }}

  build-amd64:
    name: build release artifacts (amd64)
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: build artifacts
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31.9.0
      - run: nix flake check
      - run: nix build

      - name: Get asset name
        run: |
          ASSET_NAME=pam_jit_pg-${{ steps.version.outputs.tag }}-amd64-linux-gnu.so
          cp result/lib/security/pam_jit_pg.so ./$ASSET_NAME
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

      - name: Upload build artifacts for bundling
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ASSET_NAME }}
          path: ./${{ env.ASSET_NAME }}

  bundle-build-artifacts:
    name: Bundle build artifacts
    needs:
      - build
      - build-amd64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Download build artifacts for bundling
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: "*.so"
          merge-multiple: true

      - name: Bundle build artifacts
        id: bundle
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          TARBALL_ARM64="pam_jit_pg-${TAG}-arm64.tar.xz"
          TARBALL_AMD64="pam_jit_pg-${TAG}-amd64.tar.xz"

          tar -cJf "${TARBALL_ARM64}" *arm64*.so
          tar -cJf "${TARBALL_AMD64}" *amd64*.so

          echo "## Release Checksums" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          for TARBALL in "${TARBALL_ARM64}" "${TARBALL_AMD64}"; do
            SHA256=$(sha256sum "$TARBALL" | awk '{ print $1 }')
            echo "SHA256 ($TARBALL) = $SHA256" >> $GITHUB_STEP_SUMMARY
            echo "::notice title=SHA256::SHA256 ($TARBALL) = $SHA256"
          done
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "tarball_arm64=${TARBALL_ARM64}" >> $GITHUB_OUTPUT
          echo "tarball_amd64=${TARBALL_AMD64}" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release
          path: |
            ${{ steps.bundle.outputs.tarball_arm64 }}
            ${{ steps.bundle.outputs.tarball_amd64 }}

      - name: GitHub OIDC Auth
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.SHARED_SERVICES_OIDC }}
          role-session-name: shared-services-jump

      - name: Assume destination role
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.SHARED_SERVICES_ROLE }}
          role-skip-session-tagging: true
          role-session-name: upload-assets
          role-chaining: true

      - name: Upload bundles to shared services bucket
        run: |
          aws s3 cp --no-progress ${{ steps.bundle.outputs.tarball_arm64 }} s3://${{ secrets.SHARED_SERVICES_BUCKET }}/pam_jit_pg/${{ steps.bundle.outputs.tarball_arm64 }}
          aws s3 cp --no-progress ${{ steps.bundle.outputs.tarball_amd64 }} s3://${{ secrets.SHARED_SERVICES_BUCKET }}/pam_jit_pg/${{ steps.bundle.outputs.tarball_amd64 }}
